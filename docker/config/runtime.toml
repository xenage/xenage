log_level = "INFO"

[network]
control_plane_host = "0.0.0.0"
control_plane_port = 8734
runtime_host = "0.0.0.0"
runtime_port = 8735

[control_plane]
init_ttl_seconds = 60
bootstrap_ttl_seconds = 600
state_ttl_seconds = 15
failover_check_interval_seconds = 2
failover_escalation_seconds = 15
auto_failover = true

[runtime]
join_retry_interval_seconds = 1
