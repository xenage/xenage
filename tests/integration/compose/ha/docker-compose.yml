services:
  control-plane-1:
    image: xenage:local
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/cp-1/group_state.json ]; then
          xenage-control-plane --config /config/cp-1.toml --node-id cp-1 --data-dir /data/cp-1 --endpoint http://control-plane-1:8734 init --group-id demo;
        fi;
        python -c "import json, pathlib; data=json.loads(pathlib.Path('/data/cp-1/group_state.json').read_text()); print(data['leader_pubkey'])" > /shared/leader.pubkey;
        xenage-control-plane --config /config/cp-1.toml --node-id cp-1 --data-dir /data/cp-1 --endpoint http://control-plane-1:8734 serve --bootstrap-out /shared/cp-2.token --bootstrap-out /shared/cp-3.token --bootstrap-out /shared/rt-1.token --bootstrap-out /shared/rt-2.token
    volumes:
      - cp1-data:/data/cp-1
      - shared-artifacts:/shared
      - ./config/cp-1.toml:/config/cp-1.toml:ro

  control-plane-2:
    image: xenage:local
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/cp-2/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/cp-2.token ]; do sleep 1; done;
          until xenage-control-plane --config /config/cp-2.toml --node-id cp-2 --data-dir /data/cp-2 --endpoint http://control-plane-2:8736 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/cp-2.token); do sleep 1; done;
        fi;
        xenage-control-plane --config /config/cp-2.toml --node-id cp-2 --data-dir /data/cp-2 --endpoint http://control-plane-2:8736 serve
    volumes:
      - cp2-data:/data/cp-2
      - shared-artifacts:/shared
      - ./config/cp-2.toml:/config/cp-2.toml:ro

  control-plane-3:
    image: xenage:local
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/cp-3/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/cp-3.token ]; do sleep 1; done;
          until xenage-control-plane --config /config/cp-3.toml --node-id cp-3 --data-dir /data/cp-3 --endpoint http://control-plane-3:8737 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/cp-3.token); do sleep 1; done;
        fi;
        xenage-control-plane --config /config/cp-3.toml --node-id cp-3 --data-dir /data/cp-3 --endpoint http://control-plane-3:8737 serve
    volumes:
      - cp3-data:/data/cp-3
      - shared-artifacts:/shared
      - ./config/cp-3.toml:/config/cp-3.toml:ro

  runtime-1:
    image: xenage:local
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/rt-1/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/rt-1.token ]; do sleep 1; done;
          until xenage-runtime --config /config/runtime.toml --node-id rt-1 --data-dir /data/rt-1 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/rt-1.token); do sleep 1; done;
        fi;
        xenage-runtime --config /config/runtime.toml --node-id rt-1 --data-dir /data/rt-1 serve
    volumes:
      - rt1-data:/data/rt-1
      - shared-artifacts:/shared
      - ./config/runtime.toml:/config/runtime.toml:ro

  runtime-2:
    image: xenage:local
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/rt-2/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/rt-2.token ]; do sleep 1; done;
          until xenage-runtime --config /config/runtime.toml --node-id rt-2 --data-dir /data/rt-2 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/rt-2.token); do sleep 1; done;
        fi;
        xenage-runtime --config /config/runtime.toml --node-id rt-2 --data-dir /data/rt-2 serve
    volumes:
      - rt2-data:/data/rt-2
      - shared-artifacts:/shared
      - ./config/runtime.toml:/config/runtime.toml:ro

volumes:
  cp1-data:
  cp2-data:
  cp3-data:
  rt1-data:
  rt2-data:
  shared-artifacts:
