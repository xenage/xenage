apiVersion: apps/v1
kind: Deployment
metadata:
  name: xenage-landing
  namespace: openclaw
  labels:
    app: xenage-landing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: xenage-landing
  template:
    metadata:
      labels:
        app: xenage-landing
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: landing
          image: registry.wtf.dton.io/xenage-landing:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: xenage-landing
  namespace: openclaw
spec:
  selector:
    app: xenage-landing
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xenage-landing
  namespace: openclaw
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '86400'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '86400'
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  rules:
    - host: xenage.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xenage-landing
                port:
                  number: 80
  tls:
    - hosts:
        - xenage.dev
      secretName: xenage-dev-tls
