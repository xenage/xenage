services:
  control-plane-1:
    image: xenage:local
    container_name: xenage-control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/cp-1/group_state.json ]; then
          python -c "from xenage.cli import control_plane_main; control_plane_main()" --config /config/cp-1.toml --node-id cp-1 --data-dir /data/cp-1 --endpoint http://control-plane-1:8734 init --group-id demo;
        fi;
        python -c "import json, pathlib; data=json.loads(pathlib.Path('/data/cp-1/group_state.json').read_text()); print(data['leader_pubkey'])" > /shared/leader.pubkey;
        python -c "from xenage.cli import control_plane_main; control_plane_main()" --config /config/cp-1.toml --node-id cp-1 --data-dir /data/cp-1 --endpoint http://control-plane-1:8734 serve --bootstrap-out /shared/cp-2.token --bootstrap-out /shared/cp-3.token --bootstrap-out /shared/rt-1.token --bootstrap-out /shared/rt-2.token &
        server_pid=$$!;
        until python -c "import json, pathlib, sys; p=pathlib.Path('/data/cp-1/group_state.json'); sys.exit(0 if p.exists() and len(json.loads(p.read_text()).get('control_planes', [])) >= 3 else 1)"; do sleep 1; done;
        python -c "from xenage.cli import control_plane_main; control_plane_main()" --config /config/cp-1.toml --node-id cp-1 --data-dir /data/cp-1 --endpoint http://control-plane-1:8734 gui-user-config --control-plane-url http://127.0.0.1:8734 --control-plane-url http://127.0.0.1:18734 --control-plane-url http://127.0.0.1:28734 --user-id admin --out /shared/gui-admin.yaml;
        echo '=== XENAGE GUI CONFIG (/shared/gui-admin.yaml) ===';
        cat /shared/gui-admin.yaml;
        echo '=== END XENAGE GUI CONFIG ===';
        wait $$server_pid
    volumes:
      - cp1-data:/data/cp-1
      - shared-artifacts:/shared
      - ./docker/config/cp-1.toml:/config/cp-1.toml:ro
    ports:
      - "127.0.0.1:8734:8734"

  control-plane-2:
    image: xenage:local
    container_name: xenage-control-plane-2
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/cp-2/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/cp-2.token ]; do sleep 1; done;
          until python -c "from xenage.cli import control_plane_main; control_plane_main()" --config /config/cp-2.toml --node-id cp-2 --data-dir /data/cp-2 --endpoint http://control-plane-2:8736 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/cp-2.token); do sleep 1; done;
        fi;
        python -c "from xenage.cli import control_plane_main; control_plane_main()" --config /config/cp-2.toml --node-id cp-2 --data-dir /data/cp-2 --endpoint http://control-plane-2:8736 serve
    volumes:
      - cp2-data:/data/cp-2
      - shared-artifacts:/shared
      - ./docker/config/cp-2.toml:/config/cp-2.toml:ro
    ports:
      - "127.0.0.1:18734:8736"

  control-plane-3:
    image: xenage:local
    container_name: xenage-control-plane-3
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/cp-3/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/cp-3.token ]; do sleep 1; done;
          until python -c "from xenage.cli import control_plane_main; control_plane_main()" --config /config/cp-3.toml --node-id cp-3 --data-dir /data/cp-3 --endpoint http://control-plane-3:8737 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/cp-3.token); do sleep 1; done;
        fi;
        python -c "from xenage.cli import control_plane_main; control_plane_main()" --config /config/cp-3.toml --node-id cp-3 --data-dir /data/cp-3 --endpoint http://control-plane-3:8737 serve
    volumes:
      - cp3-data:/data/cp-3
      - shared-artifacts:/shared
      - ./docker/config/cp-3.toml:/config/cp-3.toml:ro
    ports:
      - "127.0.0.1:28734:8737"

  runtime-1:
    image: xenage:local
    container_name: xenage-runtime-1
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/rt-1/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/rt-1.token ]; do sleep 1; done;
          until python -c "from xenage.cli import runtime_main; runtime_main()" --config /config/runtime.toml --node-id rt-1 --data-dir /data/rt-1 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/rt-1.token); do sleep 1; done;
        fi;
        python -c "from xenage.cli import runtime_main; runtime_main()" --config /config/runtime.toml --node-id rt-1 --data-dir /data/rt-1 serve
    volumes:
      - rt1-data:/data/rt-1
      - shared-artifacts:/shared
      - ./docker/config/runtime.toml:/config/runtime.toml:ro

  runtime-2:
    image: xenage:local
    container_name: xenage-runtime-2
    depends_on:
      - control-plane-1
    command:
      - sh
      - -lc
      - >
        if [ ! -f /data/rt-2/group_state.json ]; then
          until [ -s /shared/leader.pubkey ] && [ -s /shared/rt-2.token ]; do sleep 1; done;
          until python -c "from xenage.cli import runtime_main; runtime_main()" --config /config/runtime.toml --node-id rt-2 --data-dir /data/rt-2 connect --leader-host http://control-plane-1:8734 --leader-pubkey $(cat /shared/leader.pubkey) --bootstrap-token $(cat /shared/rt-2.token); do sleep 1; done;
        fi;
        python -c "from xenage.cli import runtime_main; runtime_main()" --config /config/runtime.toml --node-id rt-2 --data-dir /data/rt-2 serve
    volumes:
      - rt2-data:/data/rt-2
      - shared-artifacts:/shared
      - ./docker/config/runtime.toml:/config/runtime.toml:ro

volumes:
  cp1-data:
  cp2-data:
  cp3-data:
  rt1-data:
  rt2-data:
  shared-artifacts:
