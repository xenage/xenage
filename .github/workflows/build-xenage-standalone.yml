name: Build Xenage Standalone

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            os: macos
            arch: x86_64
          - platform: macos-15
            os: macos
            arch: aarch64
          - platform: ubuntu-22.04
            os: linux
            arch: x86_64
          - platform: ubuntu-22.04-arm
            os: linux
            arch: aarch64
          - platform: windows-latest
            os: windows
            arch: x86_64
          - platform: windows-11-arm
            os: windows
            arch: aarch64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.os == 'windows' && matrix.arch == 'aarch64' && '3.12' || '3.13' }}

      - name: show runner architecture
        shell: bash
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "matrix.arch=${{ matrix.arch }}"
          uname -a
          uname -m

      - name: install build dependencies (Windows ARM64)
        if: matrix.os == 'windows' && matrix.arch == 'aarch64'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cryptography>=46.0.0,<46.0.4"
          python -m pip install . pyinstaller pytest pytest-asyncio

      - name: install build dependencies (non-Windows ARM64)
        if: matrix.os != 'windows' || matrix.arch != 'aarch64'
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller pytest pytest-asyncio

      - name: run python package tests (pre-standalone)
        run: |
          python -m pytest -q tests

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-standalone-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: build standalone artifacts
        run: |
          python scripts/build_standalone.py --version "${{ steps.release_meta.outputs.release_version }}"

      - name: verify standalone binaries (post-build)
        shell: bash
        run: |
          set -euo pipefail

          binary_suffix=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            binary_suffix=".exe"
          fi

          control_plane_bin="dist/standalone-build/pyinstaller-dist/xenage-control-plane${binary_suffix}"
          runtime_bin="dist/standalone-build/pyinstaller-dist/xenage-runtime${binary_suffix}"

          [ -f "${control_plane_bin}" ]
          [ -f "${runtime_bin}" ]

          "${control_plane_bin}" --help >/dev/null
          "${runtime_bin}" --help >/dev/null

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xenage-standalone-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/standalone-release/*

  publish_release:
    if: github.event_name != 'pull_request' && always()
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-standalone-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_BODY: Automated standalone release from GitHub Actions
        shell: bash
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
              gh release delete "${RELEASE_TAG}" --repo "${REPO}" --yes --cleanup-tag
            fi
            gh release create "${RELEASE_TAG}" \
              --repo "${REPO}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes "${RELEASE_BODY}" \
              --prerelease
          else
            if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
              gh release edit "${RELEASE_TAG}" --repo "${REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_BODY}"
            else
              gh release create "${RELEASE_TAG}" \
                --repo "${REPO}" \
                --target "${GITHUB_SHA}" \
                --title "${RELEASE_NAME}" \
                --notes "${RELEASE_BODY}"
            fi
          fi

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xenage-standalone-*
          merge-multiple: true
          path: dist/standalone-release

      - name: clear existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          while IFS= read -r asset_id; do
            [ -n "${asset_id}" ] || continue
            gh api --method DELETE "repos/${REPO}/releases/assets/${asset_id}"
          done < <(gh api "repos/${REPO}/releases/tags/${RELEASE_TAG}/assets" --paginate --jq '.[].id')

      - name: upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find dist/standalone-release -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files found in dist/standalone-release to upload" >&2
            exit 1
          fi
          printf 'Standalone release files to upload:\n'
          for file in "${files[@]}"; do
            printf ' - %s\n' "${file}"
          done
          gh release upload "${RELEASE_TAG}" "${files[@]}" --repo "${REPO}"
