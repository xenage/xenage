name: Build Xenage Standalone

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: macos
            arch: x86_64
          - platform: macos-14
            os: macos
            arch: aarch64
          - platform: ubuntu-22.04
            os: linux
            arch: x86_64
          - platform: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - platform: windows-latest
            os: windows
            arch: x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller pytest pytest-asyncio

      - name: run python package tests (pre-standalone)
        run: |
          python -m pytest -q tests

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-standalone-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: build standalone artifacts
        run: |
          python scripts/build_standalone.py --version "${{ steps.release_meta.outputs.release_version }}"

      - name: verify standalone binaries (post-build)
        shell: bash
        run: |
          set -euo pipefail

          binary_suffix=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            binary_suffix=".exe"
          fi

          control_plane_bin="dist/standalone-build/pyinstaller-dist/xenage-control-plane${binary_suffix}"
          runtime_bin="dist/standalone-build/pyinstaller-dist/xenage-runtime${binary_suffix}"

          [ -f "${control_plane_bin}" ]
          [ -f "${runtime_bin}" ]

          "${control_plane_bin}" --help >/dev/null
          "${runtime_bin}" --help >/dev/null

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xenage-standalone-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/standalone-release/*

  publish_release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-standalone-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_BODY: Automated standalone release from GitHub Actions
        shell: bash
        run: |
          prerelease_flag=""
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_BODY}" ${prerelease_flag}
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${REPO}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes "${RELEASE_BODY}" \
              ${prerelease_flag}
          fi

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xenage-standalone-*
          merge-multiple: true
          path: dist/standalone-release

      - name: upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find dist/standalone-release -maxdepth 1 -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files found in dist/standalone-release to upload" >&2
            exit 1
          fi
          gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber --repo "${REPO}"
