name: Build Xenage GUI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            os: macos
            arch: x86_64
          - platform: macos-14
            os: macos
            arch: aarch64
          - platform: ubuntu-22.04
            os: linux
            arch: x86_64
          - platform: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - platform: windows-latest
            os: windows
            arch: x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: apps/xenage-gui/yarn.lock

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e .

      - name: install dependencies (linux only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: install frontend dependencies
        run: yarn install
        working-directory: apps/xenage-gui

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-gui-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: validate updater configuration
        shell: bash
        run: |
          pubkey="$(node -e "const fs=require('fs'); const config=JSON.parse(fs.readFileSync('apps/xenage-gui/src-tauri/tauri.conf.json','utf8')); process.stdout.write(config.plugins?.updater?.pubkey || '')")"
          if [ -z "${pubkey}" ] || [ "${pubkey}" = "PLACEHOLDER_PUBKEY" ]; then
            echo "Updater pubkey is missing or still set to PLACEHOLDER_PUBKEY in apps/xenage-gui/src-tauri/tauri.conf.json"
            exit 1
          fi

      - name: ensure dev release exists
        id: ensure_dev_release
        if: github.ref == 'refs/heads/dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_BODY: Automated release from GitHub Actions
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_BODY}" --prerelease
          else
            if ! gh release create "${RELEASE_TAG}" \
              --repo "${REPO}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes "${RELEASE_BODY}" \
              --prerelease; then
              if ! gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
                echo "Failed to create or locate release ${RELEASE_TAG}" >&2
                exit 1
              fi
              gh release edit "${RELEASE_TAG}" --repo "${REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_BODY}" --prerelease
            fi
          fi
          release_id="$(gh release view "${RELEASE_TAG}" --repo "${REPO}" --json id --jq '.id')"
          if [ -z "${release_id}" ]; then
            echo "Failed to resolve release id for ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

      - name: build frontend and tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/xenage-gui
          releaseId: ${{ github.ref == 'refs/heads/dev' && steps.ensure_dev_release.outputs.release_id || '' }}
          tagName: ${{ steps.release_meta.outputs.release_tag }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: "Automated release from GitHub Actions"
          releaseDraft: false
          prerelease: ${{ github.ref == 'refs/heads/dev' }}
          releaseCommitish: ${{ github.sha }}
          args: ""

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref == 'refs/heads/dev' && format('xenage-gui-dev-{0}-{1}', matrix.os, matrix.arch) || format('xenage-gui-{0}-{1}', matrix.os, matrix.arch) }}
          path: |
            apps/xenage-gui/src-tauri/target/release/bundle/msi/*.msi
            apps/xenage-gui/src-tauri/target/release/bundle/setup.exe
            apps/xenage-gui/src-tauri/target/release/bundle/dmg/*.dmg
            apps/xenage-gui/src-tauri/target/release/bundle/deb/*.deb
            apps/xenage-gui/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.tar.gz
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.zip
            apps/xenage-gui/src-tauri/target/release/bundle/**/latest.json
            apps/xenage-gui/src-tauri/target/release/*.sig
