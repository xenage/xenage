name: Build Xenage GUI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: macos
            arch: x86_64
          - platform: macos-14
            os: macos
            arch: aarch64
          - platform: ubuntu-22.04
            os: linux
            arch: x86_64
          - platform: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - platform: windows-latest
            os: windows
            arch: x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: apps/xenage-gui/yarn.lock

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Tauri build cache
        id: tauri_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/xenage-gui/src-tauri/target
          key: xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('apps/xenage-gui/src-tauri/Cargo.lock', 'apps/xenage-gui/src-tauri/Cargo.toml') }}
          restore-keys: |
            xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e .

      - name: install dependencies (linux only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: install frontend dependencies
        run: yarn install
        working-directory: apps/xenage-gui

      - name: validate updater configuration
        shell: bash
        run: |
          pubkey="$(node -e "const fs=require('fs'); const config=JSON.parse(fs.readFileSync('apps/xenage-gui/src-tauri/tauri.conf.json','utf8')); process.stdout.write(config.plugins?.updater?.pubkey || '')")"
          if [ -z "${pubkey}" ] || [ "${pubkey}" = "PLACEHOLDER_PUBKEY" ]; then
            echo "Updater pubkey is missing or still set to PLACEHOLDER_PUBKEY in apps/xenage-gui/src-tauri/tauri.conf.json"
            exit 1
          fi

      - name: build frontend and tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: yarn tauri build
        working-directory: apps/xenage-gui

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref == 'refs/heads/dev' && format('xenage-gui-dev-{0}-{1}', matrix.os, matrix.arch) || format('xenage-gui-{0}-{1}', matrix.os, matrix.arch) }}
          path: |
            apps/xenage-gui/src-tauri/target/release/bundle/msi/*.msi
            apps/xenage-gui/src-tauri/target/release/bundle/setup.exe
            apps/xenage-gui/src-tauri/target/release/bundle/dmg/*.dmg
            apps/xenage-gui/src-tauri/target/release/bundle/deb/*.deb
            apps/xenage-gui/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.tar.gz
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.zip
            apps/xenage-gui/src-tauri/target/release/bundle/**/latest.json
            apps/xenage-gui/src-tauri/target/release/*.sig

      - name: Save Tauri build cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/xenage-gui/src-tauri/target
          key: xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-${{ github.run_id }}-${{ github.run_attempt }}

  publish_release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-gui-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_BODY: Automated release from GitHub Actions
        shell: bash
        run: |
          prerelease_flag=""
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_BODY}" ${prerelease_flag}
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${REPO}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes "${RELEASE_BODY}" \
              ${prerelease_flag}
          fi

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ github.ref == 'refs/heads/dev' && 'xenage-gui-dev-*' || 'xenage-gui-*' }}
          path: dist/gui-release

      - name: clear existing dev release assets
        if: github.ref == 'refs/heads/dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          while IFS= read -r asset_id; do
            [ -n "${asset_id}" ] || continue
            gh api --method DELETE "repos/${REPO}/releases/assets/${asset_id}"
          done < <(gh api "repos/${REPO}/releases/tags/${RELEASE_TAG}/assets" --paginate --jq '.[].id')

      - name: upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find dist/gui-release -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files found in dist/gui-release to upload" >&2
            exit 1
          fi

          declare -A name_counts
          for file in "${files[@]}"; do
            base="$(basename "${file}")"
            current_count="${name_counts["${base}"]:-0}"
            name_counts["${base}"]=$((current_count + 1))
          done

          release_json="$(gh release view "${RELEASE_TAG}" --repo "${REPO}" --json assets)"

          for file in "${files[@]}"; do
            base="$(basename "${file}")"
            upload_path="${file}"

            if [ "${name_counts["${base}"]}" -gt 1 ]; then
              rel="${file#dist/gui-release/}"
              artifact_dir="${rel%%/*}"
              unique_name="${artifact_dir}__${base}"
              temp_path="/tmp/${unique_name}"
              cp "${file}" "${temp_path}"
              upload_path="${temp_path}"
              base="${unique_name}"
            fi

            existing_id="$(printf '%s' "${release_json}" | jq -r --arg name "${base}" '.assets[] | select(.name == $name) | .id' | head -n 1)"
            if [ -n "${existing_id}" ] && [ "${existing_id}" != "null" ]; then
              gh api --method DELETE "repos/${REPO}/releases/assets/${existing_id}"
            fi

            gh release upload "${RELEASE_TAG}" "${upload_path}" --repo "${REPO}"
          done
