name: Build Xenage GUI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: macos-13
            os: macos
            arch: x86_64
          - platform: macos-14
            os: macos
            arch: aarch64
          - platform: ubuntu-22.04
            os: linux
            arch: x86_64
          - platform: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - platform: windows-latest
            os: windows
            arch: x86_64
          - platform: windows-11-arm
            os: windows
            arch: aarch64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: apps/xenage-gui/yarn.lock

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Tauri build cache
        id: tauri_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/xenage-gui/src-tauri/target
          key: xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e .

      - name: install dependencies (linux only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: install frontend dependencies
        run: yarn install
        working-directory: apps/xenage-gui

      - name: validate updater configuration
        shell: bash
        run: |
          pubkey="$(node -e "const fs=require('fs'); const config=JSON.parse(fs.readFileSync('apps/xenage-gui/src-tauri/tauri.conf.json','utf8')); process.stdout.write(config.plugins?.updater?.pubkey || '')")"
          if [ -z "${pubkey}" ] || [ "${pubkey}" = "PLACEHOLDER_PUBKEY" ]; then
            echo "Updater pubkey is missing or still set to PLACEHOLDER_PUBKEY in apps/xenage-gui/src-tauri/tauri.conf.json"
            exit 1
          fi

      - name: build frontend and tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: yarn tauri build
        working-directory: apps/xenage-gui

      - name: verify updater artifacts (post-build)
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="apps/xenage-gui/src-tauri/target/release/bundle"
          latest_count="$(find "${bundle_dir}" -type f -name latest.json | wc -l | tr -d ' ')"
          if [ "${latest_count}" = "0" ]; then
            echo "No updater metadata (latest.json) was generated under ${bundle_dir}; continuing without updater manifest upload."
          else
            node - <<'NODE'
            const fs = require('fs');
            const path = require('path');

            const root = path.resolve('apps/xenage-gui/src-tauri/target/release/bundle');
            const latestFiles = [];

            function walk(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walk(full);
                } else if (entry.isFile() && entry.name === 'latest.json') {
                  latestFiles.push(full);
                }
              }
            }

            walk(root);
            if (latestFiles.length === 0) {
              throw new Error('No latest.json files found after build.');
            }

            for (const file of latestFiles) {
              const payload = JSON.parse(fs.readFileSync(file, 'utf8'));
              if (!payload.platforms || typeof payload.platforms !== 'object') {
                throw new Error(`Updater manifest ${file} does not contain "platforms".`);
              }
              if (Object.keys(payload.platforms).length === 0) {
                throw new Error(`Updater manifest ${file} has an empty "platforms" map.`);
              }
            }

            console.log(`Validated ${latestFiles.length} updater manifest(s).`);
            NODE
          fi

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref == 'refs/heads/dev' && format('xenage-gui-dev-{0}-{1}', matrix.os, matrix.arch) || format('xenage-gui-{0}-{1}', matrix.os, matrix.arch) }}
          path: |
            apps/xenage-gui/src-tauri/target/release/bundle/msi/*.msi
            apps/xenage-gui/src-tauri/target/release/bundle/setup.exe
            apps/xenage-gui/src-tauri/target/release/bundle/dmg/*.dmg
            apps/xenage-gui/src-tauri/target/release/bundle/deb/*.deb
            apps/xenage-gui/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.tar.gz
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.zip
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.sig
            apps/xenage-gui/src-tauri/target/release/bundle/**/latest.json

      - name: Save Tauri build cache
        if: success() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cache_key="xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-latest"
          while IFS= read -r cache_id; do
            [ -n "${cache_id}" ] || continue
            gh api --method DELETE "repos/${{ github.repository }}/actions/caches/${cache_id}" || true
          done < <(gh api "repos/${{ github.repository }}/actions/caches?key=${cache_key}" --jq '.actions_caches[].id')
      - name: Save Tauri build cache blob
        if: success() && github.event_name != 'pull_request'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/xenage-gui/src-tauri/target
          key: xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-latest

  publish_release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-gui-version.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_BODY: Automated release from GitHub Actions
        shell: bash
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
              gh release delete "${RELEASE_TAG}" --repo "${REPO}" --yes --cleanup-tag
            fi
            gh release create "${RELEASE_TAG}" \
              --repo "${REPO}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes "${RELEASE_BODY}" \
              --prerelease
          else
            if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
              gh release edit "${RELEASE_TAG}" --repo "${REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_BODY}"
            else
              gh release create "${RELEASE_TAG}" \
                --repo "${REPO}" \
                --target "${GITHUB_SHA}" \
                --title "${RELEASE_NAME}" \
                --notes "${RELEASE_BODY}"
            fi
          fi

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ github.ref == 'refs/heads/dev' && 'xenage-gui-dev-*' || 'xenage-gui-*' }}
          path: dist/gui-release

      - name: clear existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          while IFS= read -r asset_id; do
            [ -n "${asset_id}" ] || continue
            gh api --method DELETE "repos/${REPO}/releases/assets/${asset_id}"
          done < <(gh api "repos/${REPO}/releases/tags/${RELEASE_TAG}/assets" --paginate --jq '.[].id')

      - name: upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        shell: bash
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find dist/gui-release -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files found in dist/gui-release to upload" >&2
            exit 1
          fi

          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = path.resolve('dist/gui-release');
          const repo = process.env.REPO;
          const releaseTag = process.env.RELEASE_TAG;
          const latestOutput = path.resolve('/tmp/latest.json');
          const updaterListOutput = path.resolve('/tmp/updater-assets.txt');
          const skippedLatestOutput = path.resolve('/tmp/skipped-latest-source-files.txt');

          const allFiles = [];
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(full);
              } else if (entry.isFile()) {
                allFiles.push(full);
              }
            }
          }
          walk(root);

          const byBase = new Map();
          for (const file of allFiles) {
            const base = path.basename(file);
            if (!byBase.has(base)) {
              byBase.set(base, []);
            }
            byBase.get(base).push(file);
          }

          const latestFiles = allFiles.filter((file) => path.basename(file) === 'latest.json');
          if (latestFiles.length === 0) {
            fs.writeFileSync(updaterListOutput, '');
            fs.writeFileSync(skippedLatestOutput, '');
            console.log('No latest.json files found in downloaded artifacts; skipping merged updater manifest upload.');
            process.exit(0);
          }

          const firstManifest = JSON.parse(fs.readFileSync(latestFiles[0], 'utf8'));
          const merged = {
            version: firstManifest.version,
            notes: firstManifest.notes,
            pub_date: firstManifest.pub_date,
            platforms: {},
          };

          const updaterAssetPaths = new Set();
          for (const manifestPath of latestFiles) {
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const platforms = manifest.platforms ?? {};

            for (const [target, payload] of Object.entries(platforms)) {
              const rawUrl = payload && typeof payload.url === 'string' ? payload.url : '';
              if (!rawUrl) {
                throw new Error(`Missing updater URL for target ${target} in ${manifestPath}`);
              }

              let fileName;
              try {
                fileName = path.basename(new URL(rawUrl).pathname);
              } catch (_) {
                fileName = path.basename(rawUrl);
              }

              const candidates = byBase.get(fileName) || [];
              if (candidates.length === 0) {
                throw new Error(`Updater payload ${fileName} referenced by ${manifestPath} was not found.`);
              }

              const manifestDir = path.dirname(manifestPath);
              const preferred = candidates.find((candidate) => candidate.startsWith(manifestDir))
                || candidates[0];
              updaterAssetPaths.add(preferred);

              merged.platforms[target] = {
                ...payload,
                url: `https://github.com/${repo}/releases/download/${releaseTag}/${fileName}`,
              };
            }
          }

          if (Object.keys(merged.platforms).length === 0) {
            throw new Error('Merged updater manifest has no platform entries.');
          }

          fs.writeFileSync(latestOutput, `${JSON.stringify(merged, null, 2)}\n`);
          fs.writeFileSync(updaterListOutput, `${[...updaterAssetPaths].sort().join('\n')}\n`);
          fs.writeFileSync(skippedLatestOutput, `${latestFiles.sort().join('\n')}\n`);
          console.log(`Merged ${latestFiles.length} updater manifests into ${latestOutput}.`);
          NODE

          declare -A updater_assets
          if [ -f /tmp/updater-assets.txt ]; then
            while IFS= read -r line; do
              [ -n "${line}" ] || continue
              updater_assets["${line}"]=1
            done < /tmp/updater-assets.txt
          fi

          declare -A skip_latest
          if [ -f /tmp/skipped-latest-source-files.txt ]; then
            while IFS= read -r line; do
              [ -n "${line}" ] || continue
              skip_latest["${line}"]=1
            done < /tmp/skipped-latest-source-files.txt
          fi

          for file in "${files[@]}"; do
            if [ -n "${skip_latest["${file}"]+x}" ]; then
              continue
            fi

            if [ -n "${updater_assets["${file}"]+x}" ]; then
              base="$(basename "${file}")"
              upload_path="/tmp/${base}"
              cp "${file}" "${upload_path}"
              gh release upload "${RELEASE_TAG}" "${upload_path}" --repo "${REPO}"
              continue
            fi

            rel="${file#dist/gui-release/}"
            artifact_dir="${rel%%/*}"
            base="$(basename "${file}")"

            artifact_suffix="${artifact_dir#xenage-gui-dev-}"
            if [ "${artifact_suffix}" = "${artifact_dir}" ]; then
              artifact_suffix="${artifact_dir#xenage-gui-}"
            fi
            os="${artifact_suffix%-*}"
            arch="${artifact_suffix##*-}"

            os_label="${os}"
            if [ "${os}" = "macos" ]; then
              os_label="mac"
            elif [ "${os}" = "windows" ]; then
              os_label="win"
            fi

            arch_label="${arch}"
            if [ "${arch}" = "x86_64" ]; then
              arch_label="x86"
            elif [ "${arch}" = "aarch64" ]; then
              arch_label="aarch"
            fi

            sanitized_base="${base// /_}"
            upload_name="${os_label}_${arch_label}_Xenage_GUI_${RELEASE_VERSION}_${sanitized_base}"
            upload_path="/tmp/${upload_name}"
            cp "${file}" "${upload_path}"
            gh release upload "${RELEASE_TAG}" "${upload_path}" --repo "${REPO}"
          done

          if [ -f /tmp/latest.json ]; then
            gh release upload "${RELEASE_TAG}" /tmp/latest.json --repo "${REPO}"
          else
            echo "Skipping /tmp/latest.json upload because no updater manifest was produced."
          fi
