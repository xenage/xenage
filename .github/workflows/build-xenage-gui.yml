name: Build Xenage GUI

on:
  push:
    branches: ["main", "dev"]
    tags: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name != 'push' || github.ref_name != 'dev' || !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: macos-15-intel
            os: macos
            arch: x86_64
          - platform: macos-15
            os: macos
            arch: aarch64
          - platform: ubuntu-22.04
            os: linux
            arch: x86_64
          - platform: ubuntu-22.04-arm
            os: linux
            arch: aarch64
          - platform: windows-latest
            os: windows
            arch: x86_64
          - platform: windows-11-arm
            os: windows
            arch: aarch64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: apps/xenage-gui/yarn.lock

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Tauri build cache
        id: tauri_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.os == 'windows' && matrix.arch == 'aarch64' && '3.12' || '3.13' }}

      - name: Install Python dependencies (Windows ARM64)
        if: matrix.os == 'windows' && matrix.arch == 'aarch64'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cryptography>=46.0.0,<46.0.4"
          pip install -e .

      - name: Install Python dependencies (non-Windows ARM64)
        if: matrix.os != 'windows' || matrix.arch != 'aarch64'
        run: pip install -e .

      - name: install dependencies (linux only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: install frontend dependencies
        run: yarn install
        working-directory: apps/xenage-gui

      - name: provide .venv python shim for build scripts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .venv/bin
          ln -sf "$(command -v python)" .venv/bin/python
          .venv/bin/python --version

      - name: prepare release version
        id: build_release_meta
        run: node .github/scripts/prepare-xenage-gui-version.mjs
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: validate updater configuration
        shell: bash
        run: |
          pubkey="$(node -e "const fs=require('fs'); const config=JSON.parse(fs.readFileSync('apps/xenage-gui/src-tauri/tauri.conf.json','utf8')); process.stdout.write(config.plugins?.updater?.pubkey || '')")"
          if [ -z "${pubkey}" ] || [ "${pubkey}" = "PLACEHOLDER_PUBKEY" ]; then
            echo "Updater pubkey is missing or still set to PLACEHOLDER_PUBKEY in apps/xenage-gui/src-tauri/tauri.conf.json"
            exit 1
          fi

      - name: build frontend and tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          rm -rf src-tauri/target
          yarn tauri build
        working-directory: apps/xenage-gui

      - name: verify updater artifacts (post-build)
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="apps/xenage-gui/src-tauri/target/release/bundle"
          latest_count="$(find "${bundle_dir}" -type f -name latest.json | wc -l | tr -d ' ')"
          if [ "${latest_count}" = "0" ]; then
            echo "No updater metadata (latest.json) was generated under ${bundle_dir}; continuing without updater manifest upload."
          else
            python -c "import json, pathlib; root=pathlib.Path('${bundle_dir}'); files=list(root.rglob('latest.json')); assert files, 'No latest.json files found after build.'; [(_ for _ in ()).throw(AssertionError(f'Updater manifest {f} does not contain platforms')) if not isinstance((payload:=json.loads(f.read_text(encoding='utf-8'))).get('platforms'), dict) else None for f in files]; [(_ for _ in ()).throw(AssertionError(f'Updater manifest {f} has an empty platforms map')) if len(json.loads(f.read_text(encoding='utf-8')).get('platforms', {})) == 0 else None for f in files]; print(f'Validated {len(files)} updater manifest(s).')"
          fi

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref == 'refs/heads/dev' && format('xenage-gui-dev-{0}-{1}', matrix.os, matrix.arch) || format('xenage-gui-{0}-{1}', matrix.os, matrix.arch) }}
          if-no-files-found: error
          path: |
            apps/xenage-gui/src-tauri/target/release/bundle/msi/*.msi
            apps/xenage-gui/src-tauri/target/release/bundle/setup.exe
            apps/xenage-gui/src-tauri/target/release/bundle/dmg/*.dmg
            apps/xenage-gui/src-tauri/target/release/bundle/deb/*.deb
            apps/xenage-gui/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.tar.gz
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.zip
            apps/xenage-gui/src-tauri/target/release/bundle/**/*.sig
            apps/xenage-gui/src-tauri/target/release/bundle/**/latest.json

      - name: Save Tauri build cache
        if: success() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cache_key="xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-v2"
          while IFS= read -r cache_id; do
            [ -n "${cache_id}" ] || continue
            gh api --method DELETE "repos/${{ github.repository }}/actions/caches/${cache_id}" || true
          done < <(gh api "repos/${{ github.repository }}/actions/caches?key=${cache_key}" --jq '.actions_caches[].id')
      - name: Save Tauri build cache blob
        if: success() && github.event_name != 'pull_request'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: xenage-gui-tauri-${{ runner.os }}-${{ matrix.arch }}-v2

  publish_release:
    if: github.event_name != 'pull_request' && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: prepare release version
        id: release_meta
        run: node .github/scripts/prepare-xenage-gui-version.mjs
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: verify tagged release points to main
        if: steps.release_meta.outputs.release_mode == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"

      - name: generate release notes
        if: steps.release_meta.outputs.release_mode != 'dev'
        env:
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_MODE: ${{ steps.release_meta.outputs.release_mode }}
          RELEASE_NOTES_PATH: /tmp/release-notes.md
        run: node .github/scripts/generate-xenage-release-notes.mjs

      - name: ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_MODE: ${{ steps.release_meta.outputs.release_mode }}
          RELEASE_PRERELEASE: ${{ steps.release_meta.outputs.release_prerelease }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
        shell: bash
        run: |
          if [ "${RELEASE_MODE}" = "dev" ]; then
            if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
              gh release delete "${RELEASE_TAG}" --repo "${REPO}" --yes --cleanup-tag
            fi
            gh release create "${RELEASE_TAG}" \
              --repo "${REPO}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes "Automated development release from GitHub Actions" \
              --prerelease
          else
            if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
              gh release edit "${RELEASE_TAG}" \
                --repo "${REPO}" \
                --title "${RELEASE_NAME}" \
                --notes-file /tmp/release-notes.md
            else
              create_args=(
                "${RELEASE_TAG}"
                --repo "${REPO}"
                --target "${GITHUB_SHA}"
                --title "${RELEASE_NAME}"
                --notes-file /tmp/release-notes.md
              )
              if [ "${RELEASE_PRERELEASE}" = "true" ]; then
                create_args+=(--prerelease)
              fi
              gh release create "${create_args[@]}"
            fi
          fi

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ github.ref == 'refs/heads/dev' && 'xenage-gui-dev-*' || 'xenage-gui-*' }}
          path: dist/gui-release

      - name: upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_MODE: ${{ steps.release_meta.outputs.release_mode }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        shell: bash
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("${file}")
          done < <(find dist/gui-release -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files found in dist/gui-release to upload" >&2
            exit 1
          fi

          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = path.resolve('dist/gui-release');
          const repo = process.env.REPO;
          const releaseTag = process.env.RELEASE_TAG;
          const latestOutput = path.resolve('/tmp/latest.json');
          const updaterListOutput = path.resolve('/tmp/updater-assets.txt');
          const skippedLatestOutput = path.resolve('/tmp/skipped-latest-source-files.txt');
          const cwd = process.cwd();

          function toRepoRelative(filePath) {
            return path.relative(cwd, filePath).split(path.sep).join('/');
          }

          const allFiles = [];
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(full);
              } else if (entry.isFile()) {
                allFiles.push(full);
              }
            }
          }
          walk(root);

          const byBase = new Map();
          for (const file of allFiles) {
            const base = path.basename(file);
            if (!byBase.has(base)) {
              byBase.set(base, []);
            }
            byBase.get(base).push(file);
          }

          const latestFiles = allFiles.filter((file) => path.basename(file) === 'latest.json');
          function inferGuiTargetFromAssetName(assetName) {
            const lower = assetName.toLowerCase();
            if (lower.endsWith('.msi.zip')) {
              if (lower.includes('aarch64') || lower.includes('arm64')) {
                return 'windows-aarch64';
              }
              return 'windows-x86_64';
            }
            if (lower.endsWith('.app.tar.gz')) {
              if (lower.includes('aarch64') || lower.includes('arm64')) {
                return 'darwin-aarch64';
              }
              return 'darwin-x86_64';
            }
            if (lower.endsWith('.appimage')) {
              if (lower.includes('aarch64') || lower.includes('arm64')) {
                return 'linux-aarch64';
              }
              return 'linux-x86_64';
            }
            return null;
          }

          const updaterAssetPaths = new Set();
          const merged = latestFiles.length > 0
            ? (() => {
                const firstManifest = JSON.parse(fs.readFileSync(latestFiles[0], 'utf8'));
                const payload = {
                  version: firstManifest.version,
                  notes: firstManifest.notes,
                  pub_date: firstManifest.pub_date,
                  platforms: {},
                };

                for (const manifestPath of latestFiles) {
                  const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
                  const platforms = manifest.platforms ?? {};

                  for (const [target, targetPayload] of Object.entries(platforms)) {
                    const rawUrl = targetPayload && typeof targetPayload.url === 'string' ? targetPayload.url : '';
                    if (!rawUrl) {
                      throw new Error(`Missing updater URL for target ${target} in ${manifestPath}`);
                    }

                    let fileName;
                    try {
                      fileName = path.basename(new URL(rawUrl).pathname);
                    } catch (_) {
                      fileName = path.basename(rawUrl);
                    }

                    const candidates = byBase.get(fileName) || [];
                    if (candidates.length === 0) {
                      throw new Error(`Updater payload ${fileName} referenced by ${manifestPath} was not found.`);
                    }

                    const manifestDir = path.dirname(manifestPath);
                    const preferred = candidates.find((candidate) => candidate.startsWith(manifestDir))
                      || candidates[0];
                    updaterAssetPaths.add(preferred);

                    payload.platforms[target] = {
                      ...targetPayload,
                      url: `https://github.com/${repo}/releases/download/${releaseTag}/${fileName}`,
                    };
                  }
                }

                console.log(`Merged ${latestFiles.length} updater manifests into ${latestOutput}.`);
                return payload;
              })()
            : (() => {
                const signatureFiles = allFiles
                  .filter((file) => file.endsWith('.sig'))
                  .sort();

                if (signatureFiles.length === 0) {
                  throw new Error('No latest.json or *.sig updater artifacts were found.');
                }

                const payload = {
                  version: process.env.RELEASE_VERSION,
                  notes: '',
                  pub_date: new Date().toISOString(),
                  platforms: {},
                };

                for (const signaturePath of signatureFiles) {
                  const assetPath = signaturePath.slice(0, -4);
                  if (!fs.existsSync(assetPath)) {
                    continue;
                  }

                  const fileName = path.basename(assetPath);
                  const target = inferGuiTargetFromAssetName(fileName);
                  if (!target) {
                    continue;
                  }

                  const signature = fs.readFileSync(signaturePath, 'utf8').trim();
                  if (!signature) {
                    throw new Error(`Signature file is empty: ${signaturePath}`);
                  }

                  updaterAssetPaths.add(assetPath);
                  payload.platforms[target] = {
                    signature,
                    url: `https://github.com/${repo}/releases/download/${releaseTag}/${fileName}`,
                  };
                }

                if (Object.keys(payload.platforms).length === 0) {
                  throw new Error('No updater platform/signature pairs could be inferred from *.sig files.');
                }

                console.log(`Constructed updater manifest from ${signatureFiles.length} signature files.`);
                return payload;
              })();

          if (Object.keys(merged.platforms).length === 0) {
            throw new Error('Merged updater manifest has no platform entries.');
          }

          fs.writeFileSync(latestOutput, `${JSON.stringify(merged, null, 2)}\n`);
          fs.writeFileSync(
            updaterListOutput,
            `${[...updaterAssetPaths].map(toRepoRelative).sort().join('\n')}\n`,
          );
          fs.writeFileSync(
            skippedLatestOutput,
            `${latestFiles.map(toRepoRelative).sort().join('\n')}\n`,
          );
          if (latestFiles.length > 0) {
            console.log(`Merged ${latestFiles.length} updater manifests into ${latestOutput}.`);
          } else {
            console.log(`Synthesized updater manifest into ${latestOutput}.`);
          }
          NODE

          declare -A updater_assets
          if [ -f /tmp/updater-assets.txt ]; then
            while IFS= read -r line; do
              [ -n "${line}" ] || continue
              updater_assets["${line}"]=1
            done < /tmp/updater-assets.txt
          fi

          declare -A skip_latest
          if [ -f /tmp/skipped-latest-source-files.txt ]; then
            while IFS= read -r line; do
              [ -n "${line}" ] || continue
              skip_latest["${line}"]=1
            done < /tmp/skipped-latest-source-files.txt
          fi

          for file in "${files[@]}"; do
            if [ -n "${skip_latest["${file}"]+x}" ]; then
              continue
            fi

            if [ -n "${updater_assets["${file}"]+x}" ]; then
              base="$(basename "${file}")"
              upload_path="/tmp/${base}"
              cp "${file}" "${upload_path}"
              gh release upload "${RELEASE_TAG}" "${upload_path}" --repo "${REPO}" --clobber
              continue
            fi

            rel="${file#dist/gui-release/}"
            artifact_dir="${rel%%/*}"
            base="$(basename "${file}")"

            artifact_suffix="${artifact_dir#xenage-gui-dev-}"
            if [ "${artifact_suffix}" = "${artifact_dir}" ]; then
              artifact_suffix="${artifact_dir#xenage-gui-}"
            fi
            os="${artifact_suffix%-*}"
            arch="${artifact_suffix##*-}"

            os_label="${os}"
            if [ "${os}" = "macos" ]; then
              os_label="mac"
            elif [ "${os}" = "windows" ]; then
              os_label="win"
            fi

            arch_label="${arch}"
            if [ "${arch}" = "x86_64" ]; then
              arch_label="x86"
            elif [ "${arch}" = "aarch64" ]; then
              arch_label="aarch"
            fi

            sanitized_base="${base// /_}"
            upload_name="${os_label}_${arch_label}_Xenage_GUI_${RELEASE_VERSION}_${sanitized_base}"
            upload_path="/tmp/${upload_name}"
            cp "${file}" "${upload_path}"
            gh release upload "${RELEASE_TAG}" "${upload_path}" --repo "${REPO}" --clobber
          done

          if [ -f /tmp/latest.json ]; then
            gh release upload "${RELEASE_TAG}" /tmp/latest.json --repo "${REPO}" --clobber

            if [ "${RELEASE_MODE}" = "tag" ]; then
              if ! gh release view nightly --repo "${REPO}" >/dev/null 2>&1; then
                gh release create nightly \
                  --repo "${REPO}" \
                  --target "${GITHUB_SHA}" \
                  --title "Xenage Nightly" \
                  --notes "Automated nightly manifest pointer release" \
                  --prerelease
              fi
              gh release upload nightly /tmp/latest.json --repo "${REPO}" --clobber
            fi
          else
            echo "Skipping /tmp/latest.json upload because no updater manifest was produced."
          fi

      - name: verify uploaded release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          asset_count="$(gh release view "${RELEASE_TAG}" --repo "${REPO}" --json assets --jq '.assets | length')"
          echo "Release ${RELEASE_TAG} asset count: ${asset_count}"
          if [ "${asset_count}" -eq 0 ]; then
            echo "Release assets were not uploaded." >&2
            exit 1
          fi
